user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Charger le module ModSecurity compilé manuellement
load_module modules/ngx_http_modsecurity_module.so;

events {
    worker_connections 1024;
}

http {
	limit_req_zone $binary_remote_addr zone=mylimit:10m rate=50r/s;
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	gzip on;

	# Activer ModSecurity
    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsecurity.conf;

	ssl_certificate /etc/ssl/certs/rootCA.pem;
	ssl_certificate_key /etc/ssl/private/rootCA-key.pem;

	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_ciphers HIGH:!aNULL:!MD5;
	ssl_prefer_server_ciphers	on;

	add_header	X-Frame-Options "SAMEORIGIN" always;
	add_header	X-Content-Type-Options "nosniff" always;
	add_header	X-XSS-Protection "1; mode=block" always;
	add_header	Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

	client_max_body_size	50M;

	error_log /var/log/nginx/nginx.error.log;
	access_log /var/log/nginx/nginx.access.log;

	server {
		listen 443 ssl;
		server_name ft_transcendence;

		root /var/www/html;
		index index.html;
		location / {
			try_files $uri $uri/ /index.html;
		}
	}

	server {
		listen 443 ssl;
		server_name api.ft_transcendence;

		location /docs/ {
			proxy_pass http://swagger:8080/;
		}

		location /v1/llm/ {
			limit_req zone=mylimit burst=100;
			add_header Access-Control-Allow-Origin "*" always;
			add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
			add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

			if ($request_method = OPTIONS) {
				return 204;
			}
			proxy_buffering off;
			proxy_read_timeout 300s;
			proxy_pass http://chatllm:3002/;
		}

		location /v1/auth/ {
			limit_req zone=mylimit burst=100 nodelay;

			if ($request_method = OPTIONS) {
				add_header Access-Control-Allow-Origin "https://ft_transcendence" always;
				add_header Access-Control-Allow-Credentials "true" always;
				add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
				add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
				add_header Access-Control-Max-Age 86400 always;
				add_header Content-Length 0;
				return 204;
			}

			add_header Access-Control-Allow-Origin "https://ft_transcendence" always;
			add_header Access-Control-Allow-Credentials "true" always;

			proxy_pass http://auth:3001/;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}
	}

	server {
		listen 443 ssl;
		server_name kibana.ft_transcendence;

		location / {
			proxy_pass http://kibana:5601/;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "upgrade";
		}
	}
}
