services:
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: setup
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - "./elk-setup/setup.sh:/usr/share/elasticsearch/setup.sh"
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_ROLE_ID_elastic}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID_elastic}
    user: root
    command: "bash setup.sh"
    healthcheck:
      test: [ "CMD-SHELL", "[ -f config/certs/es01/es01.crt ]" ]
      interval: 1s
      timeout: 5s
      retries: 120
  ragsetup:
    image: rag
    build: ./RAG
    depends_on:
      es01:
        condition: service_healthy
      ollama:
        condition: service_started
      vault:
        condition: service_started
    container_name: ragsetup
    environment:
      - ELASTIC_HOSTS=https://es01:9200
      - OLLAMA_URL=${OLLAMA_URL}
      - ELASTIC_INDEX=chatllm_rag
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_ROLE_ID_ragsetup}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID_ragsetup}
      - ELASTIC_CERT_PATH=/usr/share/ragsetup/config/certs/ca/ca.crt
    volumes:
      - certs:/usr/share/ragsetup/config/certs:ro
  swagger:
    image: swaggerapi/swagger-ui
    container_name: swagger
    volumes:
      - "./swagger/swagger.json:/usr/share/nginx/html/swagger.json"
    environment:
      - SWAGGER_JSON_URL=swagger.json
      - VALIDATOR_URL=none
  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    expose:
      - 8200
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - ./vault/policies:/vault/policies
      - ./vault/secrets:/vault/secrets
  auth:
    build: ./auth
    image: auth
    container_name: auth
    restart: always
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_ROLE_ID: ${VAULT_ROLE_ID_auth}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID_auth}
      OAUTH_42_REDIRECT_URI: ${OAUTH_42_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      NODE_ENV: production
      PORT: 3001
    expose:
      - 3001
    depends_on:
      - vault
      - mariadb
  es01:
    depends_on:
      setup:
        condition: service_healthy
    build: ./elasticsearch
    image: elasticsearch
    labels:
      co.elastic.logs/module: elasticsearch
    container_name: es01
    volumes:
      - certs:/usr/share/elasticsearch/config/certs:ro
      - esdata01:/usr/share/elasticsearch/data
    environment:
      - node.name=es01
      - cluster.name=${CLUSTER_NAME}
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/es01/es01.key
      - xpack.security.http.ssl.certificate=certs/es01/es01.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/es01/es01.key
      - xpack.security.transport.ssl.certificate=certs/es01/es01.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=${LICENSE}
      - xpack.monitoring.collection.enabled=false
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_ROLE_ID_elastic}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID_elastic}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    mem_limit: ${ES_MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: [ "CMD-SHELL", "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'" ]
      interval: 10s
      timeout: 10s
      retries: 120
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    labels:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    expose:
      - 11434
  kibana:
    build: ./kibana
    depends_on:
      es01:
        condition: service_healthy
    labels:
      co.elastic.logs/module: kibana
    container_name: kibana
    image: kibana
    volumes:
      - certs:/usr/share/kibana/config/certs:ro
      - kibanadata:/usr/share/kibana/data
    expose:
      - 5601
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
      - XPACK_SECURITY_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_ROLE_ID_elastic}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID_elastic}
    mem_limit: ${KB_MEM_LIMIT}
    healthcheck:
      test: [ "CMD-SHELL", "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'" ]
      interval: 10s
      timeout: 10s
      retries: 120
  metricbeat:
    depends_on:
      es01:
        condition: service_healthy
      kibana:
        condition: service_healthy
    build: ./metricbeat
    image: metricbeat
    container_name: metricbeat
    user: root
    volumes:
      - "certs:/usr/share/metricbeat/certs:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/sys/fs/cgroup:/hostfs/sys/fs/cgroup:ro"
      - "/proc:/hostfs/proc:ro"
      - "/:/hostfs:ro"
    environment:
      - ELASTIC_HOSTS=https://es01:9200
      - KIBANA_HOSTS=http://kibana:5601
      - LOGSTASH_HOSTS=http://logstash:9600
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_ROLE_ID_elastic}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID_elastic}
  filebeat:
    depends_on:
      es01:
        condition: service_healthy
    build: ./filebeat
    container_name: filebeat
    image: filebeat
    user: root
    volumes:
      - certs:/usr/share/certs
      - filebeatlogs:/usr/share/filebeat/ingest_data/
      - "/var/lib/docker/containers:/var/lib/docker/containers:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      - ELASTIC_HOSTS=https://es01:9200
      - KIBANA_HOSTS=http://kibana:5601
      - LOGSTASH_HOSTS=http://logstash:9600
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_ROLE_ID_elastic}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID_elastic}
  logstash:
    depends_on:
      es01:
        condition: service_healthy
      kibana:
        condition: service_healthy
    container_name: logstash
    image: logstash
    build: ./logstash
    labels:
      co.elastic.logs/module: logstash
    user: root
    volumes:
      - certs:/usr/share/logstash/config/certs:ro
    environment:
      - ELASTIC_HOSTS=https://es01:9200
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_ROLE_ID_elastic}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID_elastic}
  mariadb:
    build: ./mariadb
    image: mariadb
    container_name: mariadb
    restart: always
    labels:
      - mariadb
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_ROLE_ID: ${VAULT_ROLE_ID_mariadb}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID_mariadb}
    volumes:
      - db_data:/var/lib/mysql
    depends_on:
      - vault
  chatllm:
    build: ./chatllm
    image: chatllm
    container_name: chatllm
    depends_on:
      - ollama
      - es01
      - ragsetup
    labels:
      - chatllm
    restart: always
    expose:
      - 3002
    environment:
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLM_MODEL_NAME=${OLLM_MODEL_NAME}
      - GOOGLE_MODEL_NAME=${GOOGLE_MODEL_NAME}
      - ELASTIC_HOSTS=https://es01:9200
      - ELASTIC_CERT_PATH=/usr/share/chatllm/config/certs/ca/ca.crt
      - ELASTIC_INDEX=chatllm_rag
      - PORT=3002
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_ROLE_ID_chatllm}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID_chatllm}
    volumes:
      - certs:/usr/share/chatllm/config/certs:ro
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: frontend
    container_name: frontend
    expose:
      - 5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
  nginx:
    build: ./nginx
    image: nginx
    container_name: nginx
    depends_on:
      - chatllm
      - kibana
      - vault
      - auth
      - swagger
    restart: always
    labels:
      - nginx
    ports:
      - "443:443"
    volumes:
      - "filebeatlogs:/var/log/nginx"
      - "./frontend/dist:/var/www/html"
      - certs:/etc/ssl/elk-certs
  redis:
    build: ./redis
    container_name: redis
    image: redis
    volumes:
      - redisdata:/data
      - "./redis/redis.conf:/usr/local/etc/redis/redis.conf"
    expose:
      - 6379
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_ROLE_ID=${VAULT_ROLE_ID_chatllm}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID_chatllm}

volumes:
  kibanadata:
    driver: local
    driver_opts:
      device: /home/${USER}/data/kibana
      o: bind
      type: none
  redisdata:
    driver: local
    driver_opts:
      device: /home/${USER}/data/redis
      o: bind
      type: none
  certs:
    driver: local
    driver_opts:
      device: /home/${USER}/data/certs
      o: bind
      type: none
  esdata01:
    driver: local
    driver_opts:
      device: /home/${USER}/data/es01
      o: bind
      type: none
  db_data:
    driver: local
    driver_opts:
      device: /home/${USER}/data/mariadb
      o: bind
      type: none
  ollama_data:
    driver: local
    driver_opts:
      device: /home/${USER}/data/ollama
      o: bind
      type: none
  filebeatlogs:
    driver: local
    driver_opts:
      device: /home/${USER}/data/filebeat_logs
      o: bind
      type: none

networks:
  default:
    name: elastic
    external: false
